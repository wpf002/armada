services:
  postgres:
    image: postgres:16-alpine
    container_name: armada-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: armada
      POSTGRES_PASSWORD: armada
      POSTGRES_DB: armada
    ports:
      - "5432:5432"
    volumes:
      - armada_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armada -d armada"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  armada_pgdata:
